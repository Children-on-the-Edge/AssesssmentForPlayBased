<body>
  <div id="app">
    <div class="topbar">

        <div id="google_translate_element" class="lang-switcher" title="Translate this page"></div>
      </div>
    </div>
    <div class="body-row">
      <div id="sidebar-backdrop"></div>
      <div class="sidebar" id="sidebar"></div>
      <div class="main" id="main"></div>

  <!-- Optional page translation. Google's official translator widget is available
       to nonprofit/government sites (Children on the Edge qualifies) but formally
       requires signing up via Google's own eligibility form for full support — this
       embeds the same public widget directly in the meantime. If Google ever
       restricts this further, removing these two script blocks fully removes the
       feature with no effect on anything else; browsers also offer their own
       built-in page translation as a free fallback regardless. -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: "en",
        includedLanguages: "sw,fr,rw,am,ar,pt,es",
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, "google_translate_element");
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
</body>
